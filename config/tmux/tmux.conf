# --------------------#
#      Keybinds       #
# --------------------#

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator

# set-environment -g PYENV_ROOT "$HOME/.pyenv"
# set-environment -g PATH "$HOME/.pyenv/bin:$PATH"
source-file ~/.config/tmux/tmux.reset.conf
set-hook -g client-session-changed "run-shell 'current=\$(tmux display-message -p \"#S\"); case \"\$current\" in scratch-*) ;; *) mkdir -p ~/.local/state; echo \"\$current\" > ~/.local/state/tmux_last_session;; esac'"
set-option -g prefix C-Space
set-option -g default-terminal "tmux-256color"
bind C-Space send-prefix
# set-option -g default-shell /usr/bin/fish

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# Swap keybinds
bind f resize-pane -Z       # zoom with prefix+f
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# bind z command-prompt "find-window '%%'"   # find window with prefix+z

# pane resize
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

bind-key -r M-h resize-pane -L 2
bind-key -r M-j resize-pane -D 2
bind-key -r M-k resize-pane -U 2
bind-key -r M-l resize-pane -R 2

# pane swaping
# bind-key h swap-pane -L
bind-key j swap-pane -D
bind-key k swap-pane -U
# bind-key l swap-pane -R

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# window control
bind w new-window -c "#{pane_current_path}"
bind q kill-pane

# tmux-fzf
# TMUX_FZF_LAUNCH_KEY="C-f"
# bind-key "o" run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/session.sh"
# bind-key "C-o" run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/session.sh"
# bind-key "C-w" run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/window.sh switch"

bind -N "last-session (via sesh) " Tab run-shell "sesh last"
bind-key "o" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '‚ö°  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(‚ö°  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(ūü™ü  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(‚öôÔłŹ  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(ūüďĀ  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(ūüĒé  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(‚ö°  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# --------------------#
#      Options        #
# --------------------#

# set-option -g default-terminal tmux-256color

set -s focus-events on
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',tmux-256color:RGB'

# Window title begins by 1 and not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g mouse on
set -g status on

set-option -g status-position bottom
setw -g mode-keys vi
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g set-clipboard on          # use system clipboard
set -g default-terminal "${TERM}"
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="Ôāé   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
bind-key -T copy-mode-vi v send-keys -X begin-seleciton
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_ORDER="window|session|command|keybinding"
TMUX_FZF_SESSION_FORMAT="#{session_windows} windows"
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-bind 'x'
set -g @fzf-url-open "zen"
set -g @fzf-url-history-limit '2000'
# set -g @plugin 'omerxx/tmux-floax'
# set -g @floax-width '80%'
# set -g @floax-height '80%'
# set -g @floax-border-color 'magenta'
# set -g @floax-text-color 'blue'
# set -g @floax-bind 'p'
# set -g @floax-change-path 'true'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

source-file ~/.config/tmux/theme.conf
# source-file ~/.config/tmux/colors.conf

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

set -g allow-passthrough on
